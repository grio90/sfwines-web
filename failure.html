<!DOCTYPE html>

  <style>
    .result-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 56px 48px; max-width: 480px; width: 100%; text-align: center; }
    .result-icon { font-size: 64px; margin-bottom: 24px; }
    .result-card h1 { font-family: var(--font-serif); font-size: 2rem; margin-bottom: 12px; color: var(--accent); }
    .result-card p { color: var(--text-muted); font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); font-weight: 600; font-size: 13px; padding: 13px 24px; border-radius: var(--radius); transition: border-color 0.2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
